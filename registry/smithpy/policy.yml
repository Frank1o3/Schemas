schema:
  title: SmithPy Mod Policy Schema
  description: Defines mod conflict and dependency rules for SmithPy
  type: object

  properties:
    $schema:
      type: string
      format: uri

  additionalProperties:
    type: object
    required:
      - conflicts
      - sub_mods
    additionalProperties: false
    properties:
      conflicts:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9_.-]+$"

      sub_mods:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: "^[a-z0-9_.-]+$"